<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Runner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="ui-layer">
            <div id="score">Score: 0</div>
            <div id="start-screen" class="screen active">
                <h1>Block Runner</h1>

                <div class="start-legend">
                    <div class="legend-row">
                        <div class="swatch obstacle-swatch"></div> <span class="legend-text">JUMP</span>
                        <div class="swatch floating-swatch"></div> <span class="legend-text">DUCK</span>
                    </div>
                    <div class="legend-row">
                        <div class="swatch gold-swatch"></div> <span class="legend-text">+50</span>
                        <div class="swatch red-swatch"></div> <span class="legend-text">FAST</span>
                        <div class="swatch cyan-swatch"></div> <span class="legend-text">SLOW</span>
                    </div>
                </div>

                <p style="margin-top: 20px;">Press W/SPACE to Jump &bull; S/DOWN to Duck</p>
                <p class="blink">Press ANY KEY to Start</p>
            </div>
            <div id="game-over-screen" class="screen">
                <h1>Game Over</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <p>Press ANY KEY to Restart</p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
